<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Page Not Found | Aditya Suyal</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800;900&display=swap" rel="stylesheet" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0E1A;
      --text: #F1F5F9;
      --muted: #94A3B8;
      --quiet: #64748B;
      --accent: #3B82F6;
      --accent-strong: #60A5FA;
      --panel: #151C2C;
      --line: #2E3A4E;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Urbanist", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      animation: grid-drift 24s linear infinite;
    }

    @keyframes grid-drift {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }

    /* Glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      opacity: 0.18;
      animation: blob-float 8s ease-in-out infinite alternate;
    }
    .blob-1 { width: 420px; height: 420px; background: #1d4ed8; top: -100px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 320px; height: 320px; background: #7c3aed; bottom: -80px; right: -80px; animation-delay: 3s; }

    @keyframes blob-float {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 580px;
    }

    /* Big glitchy 404 */
    .error-code {
      font-size: clamp(7rem, 22vw, 13rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      animation: glitch 4s infinite;
      user-select: none;
    }

    @keyframes glitch {
      0%, 90%, 100% { transform: translate(0); filter: none; }
      92%  { transform: translate(-3px, 1px); filter: hue-rotate(20deg); }
      94%  { transform: translate(3px, -1px); filter: hue-rotate(-20deg); }
      96%  { transform: translate(-2px, 2px); filter: hue-rotate(10deg); }
      98%  { transform: translate(2px, -2px); }
    }

    .error-code::before,
    .error-code::after {
      content: "404";
      position: absolute;
      inset: 0;
      background: inherit;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .error-code::before {
      animation: glitch-before 4s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
    }
    .error-code::after {
      animation: glitch-after 4s infinite;
      clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
    }

    @keyframes glitch-before {
      0%, 90%, 100% { transform: translate(0); opacity: 0; }
      92% { transform: translate(4px, -2px); opacity: 0.6; }
      94% { transform: translate(-4px, 2px); opacity: 0.4; }
      96% { opacity: 0; }
    }
    @keyframes glitch-after {
      0%, 90%, 100% { transform: translate(0); opacity: 0; }
      93% { transform: translate(-4px, 3px); opacity: 0.5; }
      95% { transform: translate(3px, -2px); opacity: 0.3; }
      97% { opacity: 0; }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: rgba(37,99,235,0.10);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 999px;
      color: var(--accent-strong);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 900;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border-radius: 14px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 800;
      padding: 0.75rem 1.5rem;
      text-decoration: none;
      transition: transform 200ms ease, box-shadow 200ms ease, background 200ms ease;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--accent-strong);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37,99,235,0.35);
    }

    .btn-secondary {
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--text);
    }
    .btn-secondary:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      animation: particle-float linear infinite;
    }

    @keyframes particle-float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    /* Auto-redirect countdown */
    .redirect-note {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: var(--quiet);
    }
    .redirect-note span {
      color: var(--accent-strong);
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="error-code">404</div>
    <div class="badge">Page Not Found</div>
    <h1>Looks like this page got lost<br />in the <span style="color:var(--accent-strong)">latent space.</span></h1>
    <p>The page you're looking for doesn't exist or has been moved.<br />Let's get you back on track.</p>

    <div class="actions">
      <a class="btn btn-primary" href="index.html">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Back to Home
      </a>
      <a class="btn btn-secondary" href="index.html#projects">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        View Projects
      </a>
      <a class="btn btn-secondary" href="index.html#contact">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        Contact
      </a>
    </div>

    <p class="redirect-note">Redirecting to home in <span id="countdown">10</span>s</p>
  </div>

  <script>
    // Floating particles
    const container = document.getElementById("particles");
    for (let i = 0; i < 22; i++) {
      const p = document.createElement("div");
      p.className = "particle";
      p.style.left = Math.random() * 100 + "vw";
      p.style.animationDuration = (6 + Math.random() * 10) + "s";
      p.style.animationDelay = (Math.random() * 8) + "s";
      p.style.width = p.style.height = (2 + Math.random() * 3) + "px";
      p.style.background = Math.random() > 0.5 ? "#3b82f6" : "#8b5cf6";
      container.appendChild(p);
    }

    // Countdown redirect
    let seconds = 10;
    const el = document.getElementById("countdown");
    const timer = setInterval(() => {
      seconds--;
      el.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = "index.html";
      }
    }, 1000);
  </script>
</body>
</html>
